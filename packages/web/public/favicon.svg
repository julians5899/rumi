<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- House body (deep purple) -->
  <rect x="8" y="32" width="38" height="30" rx="3" fill="#5B3A6B"/>
  <!-- House roof -->
  <path d="M2 34 L27 10 L52 34 Z" fill="#5B3A6B"/>
  <!-- Chimney -->
